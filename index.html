<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ops Desk</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { display: ['Space Grotesk','sans-serif'], mono: ['JetBrains Mono','monospace'] },
      colors: {
        bg: '#0C0F14', surface: '#131820', card: '#181E28', border: '#242D3B',
        accent: '#E8A838', 'accent-dim': '#B8862E', success: '#34D399',
        danger: '#F87171', warn: '#FBBF24', info: '#60A5FA',
        fg: '#E8ECF1', muted: '#6B7A90',
      }
    }
  }
}
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Space Grotesk', sans-serif; background: #0C0F14; color: #E8ECF1; overflow-x: hidden; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #242D3B; border-radius: 3px; }

  .ambient-orb {
    position: fixed; border-radius: 50%; filter: blur(120px); opacity: 0.08; pointer-events: none; z-index: 0;
    animation: orbFloat 25s ease-in-out infinite alternate;
  }
  .orb-1 { width: 400px; height: 400px; background: #E8A838; top: -100px; left: -60px; }
  .orb-2 { width: 300px; height: 300px; background: #34D399; bottom: -60px; right: -40px; animation-delay: -8s; }
  @keyframes orbFloat {
    0% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(20px, -30px) scale(1.06); }
    100% { transform: translate(0, 0) scale(1); }
  }

  .grid-bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image: linear-gradient(rgba(36,45,59,0.2) 1px, transparent 1px),
      linear-gradient(90deg, rgba(36,45,59,0.2) 1px, transparent 1px);
    background-size: 50px 50px;
    mask-image: radial-gradient(ellipse at center, black 15%, transparent 65%);
  }

  /* Mobile tab nav */
  .mobile-nav {
    display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: rgba(18,22,28,0.92); backdrop-filter: blur(16px);
    border-top: 1px solid #1E2530; padding: 6px 0 env(safe-area-inset-bottom, 6px);
  }
  .mobile-nav-inner {
    display: flex; justify-content: space-around; align-items: center; max-width: 480px; margin: 0 auto;
  }
  .mob-tab {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 6px 12px; border-radius: 10px; cursor: pointer; transition: all 0.2s;
    color: #4A5568; font-size: 9px; font-weight: 500; letter-spacing: 0.03em;
    -webkit-tap-highlight-color: transparent;
  }
  .mob-tab i { font-size: 16px; transition: color 0.2s; }
  .mob-tab.active { color: #E8A838; }
  .mob-tab.active i { color: #E8A838; }
  .mob-tab:not(.active):active { background: rgba(36,45,59,0.4); }

  /* Widget */
  .widget {
    background: #181E28; border: 1px solid #242D3B; border-radius: 14px;
    transition: border-color 0.3s;
  }
  .widget:hover { border-color: #2A3548; }
  .widget-header {
    padding: 12px 16px 10px; border-bottom: 1px solid #1E2530;
    display: flex; align-items: center; justify-content: space-between;
  }
  .widget-header h2 {
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: #6B7A90;
  }
  .widget-body { padding: 12px 16px 16px; }

  /* Task items */
  .task-item {
    display: flex; align-items: flex-start; gap: 9px; padding: 8px 8px; border-radius: 8px;
    transition: background 0.15s; cursor: default;
  }
  .task-item:active { background: rgba(36,45,59,0.5); }
  @media (hover: hover) { .task-item:hover { background: rgba(36,45,59,0.4); } }
  .task-item.completing { animation: taskComplete 0.4s ease forwards; }
  @keyframes taskComplete {
    0% { transform: scale(1); opacity: 1; }
    40% { background: rgba(52,211,153,0.1); }
    100% { transform: scale(0.96) translateX(12px); opacity: 0; height: 0; padding: 0; margin: 0; overflow: hidden; }
  }
  .task-check {
    width: 18px; height: 18px; border-radius: 5px; border: 2px solid #344054;
    flex-shrink: 0; cursor: pointer; transition: all 0.2s; display: flex;
    align-items: center; justify-content: center; margin-top: 1px;
  }
  .task-check.checked { border-color: #34D399; background: #34D399; }
  .task-check.checked i { color: #0C0F14; font-size: 9px; }
  .task-text.done { text-decoration: line-through; color: #3E4A5C; }
  .priority-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; margin-top: 7px; }
  .priority-high { background: #F87171; box-shadow: 0 0 5px rgba(248,113,113,0.35); }
  .priority-medium { background: #FBBF24; }
  .priority-low { background: #34D399; }

  .cat-tab {
    padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 500;
    cursor: pointer; transition: all 0.2s; color: #6B7A90; border: 1px solid transparent;
    white-space: nowrap; -webkit-tap-highlight-color: transparent;
  }
  .cat-tab.active { color: #E8A838; background: rgba(232,168,56,0.08); border-color: rgba(232,168,56,0.2); }

  /* Calendar */
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .cal-day-header {
    text-align: center; font-size: 9px; font-weight: 600; color: #3E4A5C;
    text-transform: uppercase; padding: 4px 0;
  }
  .cal-day {
    aspect-ratio: 1; border-radius: 7px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; cursor: pointer;
    transition: all 0.15s; position: relative; font-size: 12px; color: #8B95A5;
    border: 1px solid transparent; gap: 2px; -webkit-tap-highlight-color: transparent;
  }
  .cal-day:active { background: rgba(36,45,59,0.5); }
  @media (hover: hover) { .cal-day:hover { background: rgba(36,45,59,0.4); color: #E8ECF1; } }
  .cal-day.other-month { color: #1E2530; }
  .cal-day.today { border-color: #E8A838; color: #E8A838; font-weight: 700; background: rgba(232,168,56,0.06); }
  .cal-day.selected { background: rgba(232,168,56,0.15); border-color: #E8A838; color: #E8A838; font-weight: 600; }
  .cal-day.has-tasks .cal-dot-row { display: flex; }
  .cal-dot-row { display: none; gap: 2px; position: absolute; bottom: 3px; }
  .cal-dot { width: 3px; height: 3px; border-radius: 50%; }
  .cal-dot.pending { background: #FBBF24; }
  .cal-dot.completed { background: #34D399; }

  .day-panel {
    background: #131820; border: 1px solid #1E2530; border-radius: 9px;
    padding: 10px 12px; max-height: 200px; overflow-y: auto;
  }
  .day-task-item {
    display: flex; align-items: center; gap: 6px; padding: 5px 6px; border-radius: 5px;
    font-size: 11px; transition: background 0.15s;
  }
  .day-task-dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }
  .day-task-done { text-decoration: line-through; color: #3E4A5C; }

  /* Notes */
  .note-card {
    padding: 11px 13px; border-radius: 9px; border: 1px solid #242D3B;
    background: rgba(19,24,32,0.5); transition: all 0.2s; cursor: pointer;
    position: relative; overflow: hidden; -webkit-tap-highlight-color: transparent;
  }
  .note-card:active { transform: scale(0.98); }
  @media (hover: hover) { .note-card:hover { border-color: #344054; } }
  .note-card::before {
    content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; border-radius: 3px 0 0 3px;
  }
  .note-card.note-work::before { background: #E8A838; }
  .note-card.note-personal::before { background: #60A5FA; }
  .note-card.note-ideas::before { background: #A78BFA; }
  .note-card.note-urgent::before { background: #F87171; }

  /* ===== QUICK LINKS / LAUNCHPAD ===== */
  .launchpad-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .link-tile {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px; padding: 10px 6px; border-radius: 10px;
    border: 1px solid #242D3B; background: rgba(19,24,32,0.6);
    cursor: pointer; transition: all 0.18s; text-decoration: none;
    position: relative; overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  .link-tile::before {
    content: ''; position: absolute; inset: 0; opacity: 0;
    transition: opacity 0.18s; border-radius: 10px;
  }
  .link-tile:hover::before { opacity: 1; }
  .link-tile:active { transform: scale(0.93); }
  .link-tile .link-icon {
    width: 34px; height: 34px; border-radius: 9px; display: flex;
    align-items: center; justify-content: center; font-size: 15px;
    transition: transform 0.18s; flex-shrink: 0;
  }
  .link-tile:hover .link-icon { transform: scale(1.1); }
  .link-tile .link-label {
    font-size: 9px; font-weight: 500; color: #8B95A5;
    text-align: center; white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; width: 100%; letter-spacing: 0.02em;
    transition: color 0.18s;
  }
  .link-tile:hover .link-label { color: #E8ECF1; }

  /* Delete button on link tile */
  .link-tile .tile-del {
    position: absolute; top: 3px; right: 3px; width: 14px; height: 14px;
    border-radius: 4px; background: rgba(248,113,113,0.0); color: #3E4A5C;
    font-size: 7px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s; opacity: 0;
  }
  .link-tile:hover .tile-del { opacity: 1; }
  .link-tile .tile-del:hover { background: rgba(248,113,113,0.15); color: #F87171; }

  /* Add tile */
  .link-tile-add {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 5px; padding: 10px 6px; border-radius: 10px;
    border: 1px dashed #242D3B; background: transparent;
    cursor: pointer; transition: all 0.18s; color: #3E4A5C;
    -webkit-tap-highlight-color: transparent;
  }
  .link-tile-add:hover { border-color: #E8A838; color: #E8A838; background: rgba(232,168,56,0.04); }
  .link-tile-add:active { transform: scale(0.94); }
  .link-tile-add i { font-size: 14px; }
  .link-tile-add span { font-size: 8px; font-weight: 500; letter-spacing: 0.04em; }

  /* Link group label */
  .link-group-label {
    font-size: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em;
    color: #3E4A5C; margin-bottom: 5px; margin-top: 2px;
    display: flex; align-items: center; gap: 4px;
  }
  .link-group-label::after { content: ''; flex: 1; height: 1px; background: #1E2530; }

  /* Favicon img in tile */
  .tile-favicon { width: 18px; height: 18px; border-radius: 4px; object-fit: contain; }

  /* Inputs */
  .capture-input {
    background: #131820; border: 1px solid #242D3B; border-radius: 10px;
    padding: 10px 12px; color: #E8ECF1; font-family: 'Space Grotesk', sans-serif;
    font-size: 13px; width: 100%; transition: border-color 0.3s; outline: none;
  }
  .capture-input:focus { border-color: #E8A838; box-shadow: 0 0 0 3px rgba(232,168,56,0.08); }
  .capture-input::placeholder { color: #3E4A5C; }

  .btn-accent {
    background: linear-gradient(135deg, #E8A838, #D49530); color: #0C0F14; font-weight: 600;
    padding: 10px 16px; border-radius: 8px; border: none; cursor: pointer;
    font-family: 'Space Grotesk', sans-serif; font-size: 12px; transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-accent:active { transform: scale(0.96); }
  @media (hover: hover) { .btn-accent:hover { box-shadow: 0 4px 16px rgba(232,168,56,0.25); } }
  .btn-ghost {
    background: transparent; color: #6B7A90; border: 1px solid #242D3B;
    padding: 6px 12px; border-radius: 7px; cursor: pointer;
    font-family: 'Space Grotesk', sans-serif; font-size: 11px; transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-ghost:active { background: rgba(36,45,59,0.3); }

  .stat-card {
    background: linear-gradient(135deg, rgba(24,30,40,0.7), rgba(19,24,32,0.8));
    border: 1px solid #242D3B; border-radius: 9px; padding: 10px;
  }
  .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 600; }
  .stat-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: #6B7A90; margin-top: 1px; }

  .focus-bar-track { height: 4px; background: #1E2530; border-radius: 2px; overflow: hidden; }
  .focus-bar-fill { height: 100%; border-radius: 2px; transition: width 0.8s ease; background: linear-gradient(90deg, #E8A838, #F0C060); }

  .pending-banner {
    display: flex; align-items: center; gap: 8px; padding: 8px 10px;
    border-radius: 8px; border: 1px solid rgba(251,191,36,0.15);
    background: rgba(251,191,36,0.03); margin-bottom: 8px;
  }
  .pending-icon {
    width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center;
    background: rgba(251,191,36,0.1); color: #FBBF24; font-size: 11px; flex-shrink: 0;
  }

  /* Toast */
  .toast-container { position: fixed; top: 12px; right: 12px; left: 12px; z-index: 9999; display: flex; flex-direction: column; gap: 6px; }
  .toast {
    padding: 10px 14px; border-radius: 9px; font-size: 12px; font-weight: 500;
    animation: toastIn 0.3s ease, toastOut 0.25s ease 2.5s forwards;
    backdrop-filter: blur(12px); border: 1px solid #242D3B;
  }
  .toast-success { background: rgba(52,211,153,0.12); color: #34D399; border-color: rgba(52,211,153,0.25); }
  .toast-info { background: rgba(232,168,56,0.12); color: #E8A838; border-color: rgba(232,168,56,0.25); }
  .toast-danger { background: rgba(248,113,113,0.12); color: #F87171; border-color: rgba(248,113,113,0.25); }
  @keyframes toastIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes toastOut { to { opacity: 0; transform: translateY(-8px); } }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
    z-index: 1000; display: flex; align-items: flex-end; justify-content: center;
    animation: fadeIn 0.15s ease;
  }
  .modal-box {
    background: #181E28; border: 1px solid #242D3B; border-radius: 16px 16px 0 0;
    padding: 20px 18px env(safe-area-inset-bottom, 20px); width: 100%; max-width: 480px;
    animation: modalSlide 0.25s ease;
  }
  @media (min-width: 640px) {
    .modal-overlay { align-items: center; }
    .modal-box { border-radius: 14px; animation: modalPop 0.2s ease; }
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes modalSlide { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes modalPop { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .form-select, .form-input, .form-textarea {
    background: #131820; border: 1px solid #242D3B; border-radius: 8px;
    padding: 10px 12px; color: #E8ECF1; font-family: 'Space Grotesk', sans-serif;
    font-size: 14px; outline: none; transition: border-color 0.2s; width: 100%;
  }
  .form-select:focus, .form-input:focus, .form-textarea:focus { border-color: #E8A838; }
  .form-select option { background: #181E28; }

  .streak-badge {
    display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px;
    background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.15);
    border-radius: 14px; font-size: 10px; color: #F87171; font-weight: 600;
  }

  .widget { animation: widgetIn 0.4s ease backwards; }
  @keyframes widgetIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  /* Mobile: show bottom nav, hide desktop header clock on small */
  @media (max-width: 639px) {
    .mobile-nav { display: block; }
    .desk-clock { display: none; }
    .mobile-content { padding-bottom: 72px; }
  }
  @media (min-width: 640px) {
    .mobile-content { padding-bottom: 0; }
  }

  /* Tablet: tasks full width top, then 2-col below */
  @media (min-width: 640px) and (max-width: 1023px) {
    .dash-grid { grid-template-columns: 1fr 1fr !important; }
    #panel-tasks { grid-column: span 2; }
  }
  /* Desktop: Tasks wide left (spans 2 rows) | Calendar top-right
                                               | bottom row: Notes + Links */
  @media (min-width: 1024px) {
    .dash-grid {
      grid-template-columns: 1.2fr 1fr 1fr !important;
      grid-template-rows: auto auto;
    }
    #panel-tasks    { grid-column: 1; grid-row: 1; }
    #panel-notes    { grid-column: 1; grid-row: 2; }
    #panel-calendar { grid-column: 2 / 4; grid-row: 1; }
    #panel-links    { grid-column: 2 / 4; grid-row: 2; }
  }
  /* Mobile: single column, only show active panel */
  @media (max-width: 639px) {
    .dash-grid { grid-template-columns: 1fr !important; }
    .dash-grid .widget { display: none; }
    .dash-grid .widget.mob-active { display: block; animation: widgetIn 0.3s ease; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>

<div class="ambient-orb orb-1"></div>
<div class="ambient-orb orb-2"></div>
<div class="grid-bg"></div>
<div class="toast-container" id="toastContainer"></div>

<div class="relative z-10 min-h-screen p-3 sm:p-4 md:p-6 lg:p-8 max-w-[1400px] mx-auto mobile-content">

  <!-- Header -->
  <header class="flex items-center justify-between mb-4 sm:mb-5">
    <div>
      <div class="flex items-center gap-2.5 mb-0.5">
        <div class="w-7 h-7 sm:w-8 sm:h-8 rounded-lg bg-gradient-to-br from-accent to-accent-dim flex items-center justify-center">
          <i class="fas fa-satellite-dish text-bg text-xs sm:text-sm"></i>
        </div>
        <h1 class="text-lg sm:text-xl font-bold tracking-tight">Ops Desk</h1>
      </div>
      <p class="text-muted text-[10px] sm:text-xs ml-9 sm:ml-11" id="greetingText"></p>
    </div>
    <div class="flex items-center gap-3">
      <div class="text-right desk-clock">
        <div class="font-mono text-sm font-semibold" id="headerClock">00:00:00</div>
        <div class="text-muted text-[9px]" id="headerDate"></div>
      </div>
      <div class="streak-badge">
        <i class="fas fa-fire"></i>
        <span id="streakCount">0d</span>
      </div>
    </div>
  </header>

  <!-- Quick Capture -->
  <div class="mb-4 sm:mb-5 flex gap-2.5">
    <div class="relative flex-1">
      <i class="fas fa-bolt absolute left-3.5 top-1/2 -translate-y-1/2 text-muted text-xs"></i>
      <input type="text" class="capture-input pl-9 text-sm" id="quickCapture" placeholder="Quick capture — type and hit Enter..." autocomplete="off">
    </div>
    <button class="btn-accent whitespace-nowrap" onclick="openAddTaskModal()">
      <i class="fas fa-plus sm:mr-1.5"></i><span class="hidden sm:inline">Add Task</span>
    </button>
  </div>

  <!-- Dashboard Grid -->
  <div class="dash-grid grid gap-3 sm:gap-4" style="grid-template-columns: 1fr;">

    <!-- Panel 1: All Tasks -->
    <div class="widget mob-active" id="panel-tasks">
      <div class="widget-header">
        <h2><i class="fas fa-list-check mr-1.5 text-accent"></i>All Tasks</h2>
        <div class="flex items-center gap-1.5">
          <span class="text-[9px] text-muted font-mono" id="taskCount">0/0</span>
          <select class="form-select text-[9px] py-0.5 px-1.5 w-auto" id="taskSort" onchange="renderTasks()" style="font-size:9px;padding:3px 6px;">
            <option value="priority">Priority</option>
            <option value="created">Newest</option>
            <option value="alpha">A-Z</option>
          </select>
        </div>
      </div>
      <div id="pendingBanner" class="mx-4 mt-2.5"></div>
      <div class="px-4 pt-1.5 pb-0.5 flex gap-1 flex-wrap" id="categoryTabs"></div>
      <div class="widget-body pt-1" style="max-height: calc(100vh - 280px); overflow-y: auto;" id="taskList"></div>
    </div>

    <!-- Panel 2: Calendar + Today -->
    <div class="widget" id="panel-calendar">
      <div class="widget-header">
        <h2><i class="fas fa-calendar-days mr-1.5 text-accent"></i>Calendar</h2>
        <div class="flex items-center gap-1">
          <button class="btn-ghost py-0.5 px-1.5 text-[10px]" onclick="changeMonth(-1)"><i class="fas fa-chevron-left"></i></button>
          <span class="text-[10px] font-medium text-fg min-w-[80px] text-center" id="calMonthLabel"></span>
          <button class="btn-ghost py-0.5 px-1.5 text-[10px]" onclick="changeMonth(1)"><i class="fas fa-chevron-right"></i></button>
        </div>
      </div>
      <div class="widget-body">
        <div class="cal-grid mb-1" id="calHeaders"></div>
        <div class="cal-grid" id="calDays"></div>
        <div id="dayDetail" style="display:none;" class="mt-2.5 day-panel"></div>
      </div>

      <!-- Today Stats -->
      <div style="border-top: 1px solid #1E2530;">
        <div class="px-4 pt-3 pb-1 flex items-center justify-between">

          <div class="color-swatch" data-color="#60A5FA" style="width:22px;height:22px;border-radius:6px;background:#60A5FA;cursor:pointer;border:2px solid transparent;transition:all 0.15s;" onclick="selectColor(this,'#60A5FA')"></div>
          <div class="color-swatch" data-color="#34D399" style="width:22px;height:22px;border-radius:6px;background:#34D399;cursor:pointer;border:2px solid transparent;transition:all 0.15s;" onclick="selectColor(this,'#34D399')"></div>
          <div class="color-swatch" data-color="#F87171" style="width:22px;height:22px;border-radius:6px;background:#F87171;cursor:pointer;border:2px solid transparent;transition:all 0.15s;" onclick="selectColor(this,'#F87171')"></div>
          <div class="color-swatch" data-color="#A78BFA" style="width:22px;height:22px;border-radius:6px;background:#A78BFA;cursor:pointer;border:2px solid transparent;transition:all 0.15s;" onclick="selectColor(this,'#A78BFA')"></div>
          <div class="color-swatch" data-color="#FB923C" style="width:22px;height:22px;border-radius:6px;background:#FB923C;cursor:pointer;border:2px solid transparent;transition:all 0.15s;" onclick="selectColor(this,'#FB923C')"></div>
          <div class="color-swatch" data-color="#38BDF8" style="width:22px;height:22px;border-radius:6px;background:#38BDF8;cursor:pointer;border:2px solid transparent;transition:all 0.15s;" onclick="selectColor(this,'#38BDF8')"></div>
          <div class="color-swatch" data-color="#F472B6" style="width:22px;height:22px;border-radius:6px;background:#F472B6;cursor:pointer;border:2px solid transparent;transition:all 0.15s;" onclick="selectColor(this,'#F472B6')"></div>
        </div>
      </div>

<script>
const STORAGE_KEY = 'ops_desk_v5';
const todayStr = () => new Date().toISOString().split('T')[0];
let state = loadState();
let currentMobileTab = 'tasks';
let selectedLinkColor = '#E8A838';

// ===== DEFAULT LINKS =====
function defaultLinks() {
  return [
    { id:1, label:'Gmail', url:'https://mail.google.com', group:'comms', icon:'fa-envelope', color:'#F87171' },
    { id:2, label:'Calendar', url:'https://calendar.google.com', group:'comms', icon:'fa-calendar', color:'#60A5FA' },
    { id:3, label:'GitHub', url:'https://github.com', group:'dev', icon:'fa-github', color:'#E8ECF1' },
    { id:4, label:'Notion', url:'https://notion.so', group:'work', icon:'fa-n', color:'#E8ECF1' },
    { id:5, label:'Figma', url:'https://figma.com', group:'dev', icon:'fa-pen-nib', color:'#A78BFA' },
    { id:6, label:'Slack', url:'https://slack.com', group:'comms', icon:'fa-hashtag', color:'#34D399' },
    { id:7, label:'Linear', url:'https://linear.app', group:'work', icon:'fa-circle-half-stroke', color:'#60A5FA' },
    { id:8, label:'Drive', url:'https://drive.google.com', group:'tools', icon:'fa-hard-drive', color:'#FBBF24' },
    { id:9, label:'Vercel', url:'https://vercel.com', group:'dev', icon:'fa-triangle-exclamation', color:'#E8ECF1' },
    { id:10, label:'ChatGPT', url:'https://chatgpt.com', group:'tools', icon:'fa-robot', color:'#34D399' },
    { id:11, label:'Spotify', url:'https://spotify.com', group:'other', icon:'fa-music', color:'#34D399' },
    { id:12, label:'YouTube', url:'https://youtube.com', group:'other', icon:'fa-youtube', color:'#F87171' },
  ];
}

function defaultState() {
  const t = todayStr();
  const d = (offset) => { const x = new Date(); x.setDate(x.getDate() + offset); return x.toISOString().split('T')[0]; };
  return {
    tasks: [
      { id:1, text:'Review quarterly report and prepare summary', priority:'high', category:'work', done:false, created:Date.now()-3600000, date:t },
      { id:2, text:'Schedule dentist appointment', priority:'medium', category:'personal', done:false, created:Date.now()-7200000, date:t },
      { id:3, text:'Complete chapter 5 of design patterns', priority:'low', category:'learning', done:false, created:Date.now()-10800000, date:t },
      { id:4, text:'Morning run — 5km moderate pace', priority:'medium', category:'health', done:true, created:Date.now()-14400000, date:t },
      { id:5, text:'Prepare slides for Monday standup', priority:'high', category:'work', done:false, created:Date.now()-18000000, date:d(1) },
      { id:6, text:'Buy groceries for the week', priority:'low', category:'personal', done:true, created:Date.now()-21600000, date:d(-1) },
      { id:7, text:'Submit expense report to finance', priority:'high', category:'work', done:false, created:Date.now()-25200000, date:d(1) },
      { id:8, text:'Call insurance about claim', priority:'medium', category:'personal', done:false, created:Date.now()-28800000, date:d(-1) },
      { id:9, text:'Update portfolio with new projects', priority:'low', category:'work', done:false, created:Date.now()-32400000, date:t },
      { id:10, text:'Meal prep for next three days', priority:'medium', category:'health', done:false, created:Date.now()-36000000, date:d(1) },
    ],
    notes: [
      { id:1, title:'Meeting Notes', content:'Discussed new roadmap priorities. Need follow-up on API redesign by Friday. Team agreed on two-week sprint cycle.', tag:'work', created:Date.now()-86400000 },
      { id:2, title:'Book Recommendations', content:'Atomic Habits, Deep Work, The Pragmatic Programmer. Check library availability this weekend.', tag:'personal', created:Date.now()-172800000 },
      { id:3, title:'App Idea', content:'Habit tracker with AI-powered suggestions based on completion patterns and calendar integration.', tag:'ideas', created:Date.now()-259200000 },
      { id:4, title:'Server Migration Checklist', content:'1. Backup databases 2. Test staging 3. DNS propagation 4. SSL renewal 5. Monitor 48h', tag:'urgent', created:Date.now()-43200000 },
      { id:5, title:'Workout Routine', content:'Mon: Upper, Tue: Cardio, Wed: Lower, Thu: Rest, Fri: Full body, Sat: Yoga, Sun: Rest.', tag:'personal', created:Date.now()-345600000 },
    ],
    links: defaultLinks(),
    activeCategory:'all', calMonth:new Date().getMonth(), calYear:new Date().getFullYear(),
    selectedDate:null, lastDate:t, streak:0,
  };
}

function loadState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) {
      const p = JSON.parse(s);
      if (p.calMonth == null) { p.calMonth = new Date().getMonth(); p.calYear = new Date().getFullYear(); }
      if (!p.links) p.links = defaultLinks();
      return p;
    }
  } catch(e) {}
  return defaultState();
}

function saveState() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {} }

// ===== MOBILE TAB SWITCHING =====
function switchMobileTab(tab) {
  currentMobileTab = tab;
  document.querySelectorAll('.mob-tab').forEach(el => el.classList.toggle('active', el.dataset.panel === tab));
  document.querySelectorAll('.dash-grid .widget').forEach(el => el.classList.remove('mob-active'));
  const panel = document.getElementById(`panel-${tab}`);
  if (panel) {
    panel.style.animation = 'none'; panel.offsetHeight; panel.style.animation = '';
    panel.classList.add('mob-active');
  }
}

// ===== TOAST =====
function showToast(msg, type='info') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  const icons = { success:'fa-check-circle', info:'fa-info-circle', danger:'fa-exclamation-circle' };
  t.className = `toast toast-${type}`;
  t.innerHTML = `<i class="fas ${icons[type]||icons.info} mr-1.5"></i>${msg}`;
  c.appendChild(t);
  setTimeout(() => t.remove(), 2900);
}

// ===== CLOCK =====
function updateClock() {
  const now = new Date();
  document.getElementById('headerClock').textContent =
    `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  document.getElementById('headerDate').textContent = now.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
  document.getElementById('statsDate').textContent = now.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  const h = now.getHours();
  document.getElementById('greetingText').textContent = `${h<12?'Good morning':h<17?'Good afternoon':'Good evening'}. Here is your overview.`;
}
setInterval(updateClock, 1000); updateClock();

// ===== TASKS =====
let nextTaskId = Math.max(0, ...state.tasks.map(t=>t.id)) + 1;

function getFilteredTasks() {
  let tasks = [...state.tasks];
  if (state.activeCategory !== 'all') tasks = tasks.filter(t => t.category === state.activeCategory);
  const sort = document.getElementById('taskSort').value;
  const po = {high:0,medium:1,low:2};
  if (sort==='priority') tasks.sort((a,b)=>po[a.priority]-po[b.priority]);
  else if (sort==='created') tasks.sort((a,b)=>b.created-a.created);
  else tasks.sort((a,b)=>a.text.localeCompare(b.text));
  return tasks;
}

function renderCategoryTabs() {
  const cats=['all','work','personal','health','learning'];
  const labels={all:'All',work:'Work',personal:'Personal',health:'Health',learning:'Learning'};
  const icons={all:'fa-layer-group',work:'fa-briefcase',personal:'fa-user',health:'fa-heart-pulse',learning:'fa-graduation-cap'};
  const counts={}; cats.forEach(c=>counts[c]=c==='all'?state.tasks.length:state.tasks.filter(t=>t.category===c).length);
  document.getElementById('categoryTabs').innerHTML = cats.map(c=>
    `<div class="cat-tab ${state.activeCategory===c?'active':''}" onclick="setCategory('${c}')">
      <i class="fas ${icons[c]} mr-0.5" style="font-size:8px;"></i>${labels[c]} <span class="opacity-50">${counts[c]}</span>
    </div>`).join('');
}

function setCategory(cat) { state.activeCategory=cat; renderTasks(); }

function renderPendingBanner() {
  const pending = state.tasks.filter(t=>!t.done);
  const high = pending.filter(t=>t.priority==='high');
  const banner = document.getElementById('pendingBanner');
  if (!pending.length) { banner.innerHTML=''; return; }
  const hl = high.length>0 ? high.slice(0,2).map(t=>
    `<span class="inline-flex items-center gap-1 text-[9px]"><span class="priority-dot priority-high" style="margin:0;width:3px;height:3px;"></span>${esc(t.text.length>28?t.text.slice(0,28)+'...':t.text)}</span>`
  ).join('<span class="text-border mx-0.5 opacity-30">|</span>') : '';
  banner.innerHTML = `<div class="pending-banner">
    <div class="pending-icon"><i class="fas fa-hourglass-half"></i></div>
    <div class="flex-1 min-w-0">
      <div class="flex items-center gap-2 mb-0.5">
        <span class="text-[10px] font-semibold text-warn">${pending.length} Pending</span>
        ${high.length?`<span class="text-[8px] text-danger">${high.length} high</span>`:''}
      </div>
      ${hl?`<div class="text-[9px] text-muted truncate">${hl}</div>`:'<div class="text-[9px] text-muted">All clear on high priority</div>'}
    </div>
  </div>`;
}

function renderTasks() {
  const tasks = getFilteredTasks();
  const done = tasks.filter(t=>t.done).length;
  document.getElementById('taskCount').textContent = `${done}/${tasks.length}`;
  renderPendingBanner();
  if (!tasks.length) {
    document.getElementById('taskList').innerHTML = `<div class="text-center py-8 text-muted"><i class="fas fa-inbox text-xl mb-2 opacity-25"></i><p class="text-[11px]">No tasks here</p></div>`;
    renderCategoryTabs(); return;
  }
  const pending = tasks.filter(t=>!t.done), completed = tasks.filter(t=>t.done);
  let html = pending.map(t=>taskHTML(t)).join('');
  if (completed.length) {
    html += `<div class="text-[8px] text-muted uppercase tracking-wider mt-2 mb-0.5 px-2 flex items-center gap-2"><span class="flex-1 h-px bg-border"></span>Completed<span class="flex-1 h-px bg-border"></span></div>`;
    html += completed.map(t=>taskHTML(t)).join('');
  }
  document.getElementById('taskList').innerHTML = html;
  renderCategoryTabs(); updateStats();
}

function taskHTML(t) {
  const dl = t.date===todayStr()?'Today':t.date===getYesterday()?'Yesterday':fmtDate(t.date);
  return `<div class="task-item" id="task-${t.id}">
    <div class="task-check ${t.done?'checked':''}" onclick="toggleTask(${t.id})">${t.done?'<i class="fas fa-check"></i>':''}</div>
    <div class="priority-dot priority-${t.priority}"></div>
    <div class="flex-1 min-w-0">
      <div class="task-text ${t.done?'done':''} text-[12px] leading-snug">${esc(t.text)}</div>
      <div class="flex items-center gap-1.5 mt-0.5">
        <span class="text-[7px] uppercase tracking-wider px-1.5 py-0.5 rounded" style="background:rgba(107,122,144,0.1);color:#6B7A90;">${t.category}</span>
        <span class="text-[7px] text-muted">${dl}</span>
      </div>
    </div>
    <button class="text-muted hover:text-danger transition text-[10px] p-1 flex-shrink-0" onclick="deleteTask(${t.id})"><i class="fas fa-trash-can"></i></button>
  </div>`;
}

function toggleTask(id) {
  const task = state.tasks.find(t=>t.id===id); if(!task) return;
  if (!task.done) {
    const el = document.getElementById(`task-${id}`);
    if (el) el.classList.add('completing');
    setTimeout(()=>{task.done=true;saveState();renderTasks();renderCalendar();showToast('Task completed!','success');},400);
  } else { task.done=false; saveState(); renderTasks(); renderCalendar(); }
}
function deleteTask(id) { state.tasks=state.tasks.filter(t=>t.id!==id); saveState(); renderTasks(); renderCalendar(); showToast('Task removed','danger'); }

function addTask() {
  const name = document.getElementById('newTaskName').value.trim();
  if (!name) { showToast('Enter a task name','danger'); return; }
  state.tasks.unshift({ id:nextTaskId++, text:name, priority:document.getElementById('newTaskPriority').value,
    category:document.getElementById('newTaskCategory').value, done:false, created:Date.now(),
    date:document.getElementById('newTaskDate').value||todayStr() });
  saveState(); renderTasks(); renderCalendar(); closeAddTaskModal();
  document.getElementById('newTaskName').value=''; document.getElementById('newTaskDate').value=todayStr();
  showToast('Task added','success');
}

function openAddTaskModal() { document.getElementById('addTaskModal').style.display='flex'; setTimeout(()=>document.getElementById('newTaskName').focus(),100); }
function closeAddTaskModal() { document.getElementById('addTaskModal').style.display='none'; }

document.getElementById('quickCapture').addEventListener('keydown', function(e) {
  if (e.key==='Enter') {
    const v=this.value.trim(); if(!v) return;
    state.tasks.unshift({id:nextTaskId++,text:v,priority:'medium',category:'work',done:false,created:Date.now(),date:todayStr()});
    this.value=''; saveState(); renderTasks(); renderCalendar(); showToast('Task captured','success');
  }
});

// ===== CALENDAR =====
const dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];

function changeMonth(d) {
  state.calMonth+=d;
  if(state.calMonth>11){state.calMonth=0;state.calYear++;}
  if(state.calMonth<0){state.calMonth=11;state.calYear--;}
  state.selectedDate=null; saveState(); renderCalendar();
}

function renderCalendar() {
  document.getElementById('calHeaders').innerHTML = dayNames.map(d=>`<div class="cal-day-header">${d}</div>`).join('');
  document.getElementById('calMonthLabel').textContent = `${monthNames[state.calMonth].slice(0,3)} ${state.calYear}`;
  const fd = new Date(state.calYear,state.calMonth,1).getDay();
  const dim = new Date(state.calYear,state.calMonth+1,0).getDate();
  const dip = new Date(state.calYear,state.calMonth,0).getDate();
  const t = todayStr();
  let cells = [];
  for(let i=fd-1;i>=0;i--) {
    const d=dip-i, pm=state.calMonth===0?11:state.calMonth-1, py=state.calMonth===0?state.calYear-1:state.calYear;
    cells.push({day:d,dateStr:`${py}-${String(pm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`,other:true});
  }
  for(let d=1;d<=dim;d++) cells.push({day:d,dateStr:`${state.calYear}-${String(state.calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`,other:false});
  const rem=42-cells.length;
  for(let d=1;d<=rem;d++) {
    const nm=state.calMonth===11?0:state.calMonth+1, ny=state.calMonth===11?state.calYear+1:state.calYear;
    cells.push({day:d,dateStr:`${ny}-${String(nm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`,other:true});
  }
  const tm={};
  state.tasks.forEach(task=>{if(!tm[task.date])tm[task.date]={pending:0,completed:0};task.done?tm[task.date].completed++:tm[task.date].pending++;});
  document.getElementById('calDays').innerHTML = cells.map(c=>{
    const isT=c.dateStr===t, isS=c.dateStr===state.selectedDate, info=tm[c.dateStr], has=info&&(info.pending>0||info.completed>0);
    let cls='cal-day'; if(c.other)cls+=' other-month'; if(isT)cls+=' today'; if(isS)cls+=' selected'; if(has)cls+=' has-tasks';
    let dots='';
    if(has){dots='<div class="cal-dot-row">';for(let i=0;i<Math.min(info.pending,2);i++)dots+='<div class="cal-dot pending"></div>';if(info.completed>0)dots+='<div class="cal-dot completed"></div>';dots+='</div>';}
    return `<div class="${cls}" onclick="selectDate('${c.dateStr}')"><span>${c.day}</span>${dots}</div>`;
  }).join('');
  renderDayDetail();
}

function selectDate(ds) { state.selectedDate=state.selectedDate===ds?null:ds; saveState(); renderCalendar(); }

function renderDayDetail() {
  const panel=document.getElementById('dayDetail');
  if(!state.selectedDate){panel.style.display='none';return;}
  const dt=state.tasks.filter(t=>t.date===state.selectedDate);
  const label=state.selectedDate===todayStr()?'Today':state.selectedDate===getYesterday()?'Yesterday':fmtDate(state.selectedDate);
  const pend=dt.filter(t=>!t.done), done=dt.filter(t=>t.done);
  if(!dt.length){
    panel.style.display='block';
    panel.innerHTML=`<div class="text-center py-2"><p class="text-[10px] text-muted mb-0.5 font-medium">${label}</p><p class="text-[9px] text-muted opacity-50">No tasks</p><button class="btn-ghost text-[9px] py-1 px-2 mt-1.5" onclick="openAddTaskForDate('${state.selectedDate}')"><i class="fas fa-plus mr-1"></i>Add</button></div>`;
    return;
  }
  let html=`<div class="flex items-center justify-between mb-1.5"><span class="text-[10px] font-semibold text-fg">${label}</span><span class="text-[8px] text-muted font-mono">${done.length}/${dt.length}</span></div>`;
  if(pend.length) html+=pend.map(t=>`<div class="day-task-item"><div class="day-task-dot priority-${t.priority}"></div><span class="flex-1 truncate">${esc(t.text)}</span><span class="text-[7px] text-warn uppercase">Pend</span></div>`).join('');
  if(done.length) html+=done.map(t=>`<div class="day-task-item"><div class="day-task-dot" style="background:#34D399;"></div><span class="flex-1 truncate day-task-done">${esc(t.text)}</span><span class="text-[7px] text-success uppercase">Done</span></div>`).join('');
  panel.style.display='block'; panel.innerHTML=html;
}

function openAddTaskForDate(ds) { openAddTaskModal(); document.getElementById('newTaskDate').value=ds; }

// ===== STATS =====
function updateStats() {
  const tt=state.tasks.filter(t=>t.date===todayStr()), total=tt.length, comp=tt.filter(t=>t.done).length;
  const rate=total>0?Math.round(comp/total*100):0;
  document.getElementById('statCompleted').textContent=comp;
  document.getElementById('statPending').textContent=total-comp;
  document.getElementById('statTotal').textContent=total;
  document.getElementById('statRate').textContent=`${rate}%`;
  document.getElementById('progressPercent').textContent=`${rate}%`;
  document.getElementById('progressBar').style.width=`${rate}%`;
  if(comp>0) state.streak=Math.max(state.streak,1);
  document.getElementById('streakCount').textContent=`${state.streak}d`;
  saveState();
}

// ===== NOTES =====
let editingNoteId=null, nextNoteId=Math.max(0,...state.notes.map(n=>n.id))+1;

function renderNotes() {
  const notes=[...state.notes].sort((a,b)=>b.created-a.created);
  if(!notes.length){document.getElementById('notesList').innerHTML=`<div class="text-center py-8 text-muted"><i class="fas fa-note-sticky text-lg mb-1.5 opacity-25"></i><p class="text-[11px]">No notes yet</p></div>`;return;}
  document.getElementById('notesList').innerHTML = notes.map(n=>`
    <div class="note-card note-${n.tag} mb-2" onclick="editNote(${n.id})">
      <div class="flex items-start justify-between mb-1">
        <h4 class="font-semibold text-[11px] text-fg pr-2">${esc(n.title)}</h4>
        <button class="text-muted hover:text-danger transition text-[10px] flex-shrink-0" onclick="event.stopPropagation();deleteNote(${n.id})"><i class="fas fa-xmark"></i></button>
      </div>
      <p class="text-[10px] text-muted leading-relaxed" style="display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;">${esc(n.content)}</p>
      <div class="flex items-center gap-2 mt-1.5">
        <span class="text-[7px] uppercase tracking-wider px-1.5 py-0.5 rounded" style="background:rgba(107,122,144,0.1);color:#6B7A90;">${n.tag}</span>
        <span class="text-[7px] text-muted">${timeAgo(n.created)}</span>
      </div>
    </div>`).join('');
}

function openNoteModal(id=null) {
  editingNoteId=id;
  if(id){const n=state.notes.find(x=>x.id===id);document.getElementById('noteModalTitle').textContent='Edit Note';document.getElementById('noteTitle').value=n.title;document.getElementById('noteContent').value=n.content;document.getElementById('noteTag').value=n.tag;}
  else{document.getElementById('noteModalTitle').textContent='New Note';document.getElementById('noteTitle').value='';document.getElementById('noteContent').value='';document.getElementById('noteTag').value='work';}
  document.getElementById('noteModal').style.display='flex'; setTimeout(()=>document.getElementById('noteTitle').focus(),100);
}
function closeNoteModal(){document.getElementById('noteModal').style.display='none';editingNoteId=null;}
function editNote(id){openNoteModal(id);}
function saveNote() {
  const title=document.getElementById('noteTitle').value.trim(), content=document.getElementById('noteContent').value.trim();
  if(!title){showToast('Enter a title','danger');return;}
  if(editingNoteId){const n=state.notes.find(x=>x.id===editingNoteId);n.title=title;n.content=content;n.tag=document.getElementById('noteTag').value;showToast('Note updated','success');}
  else{state.notes.unshift({id:nextNoteId++,title,content,tag:document.getElementById('noteTag').value,created:Date.now()});showToast('Note saved','success');}
  saveState();renderNotes();closeNoteModal();
}
function deleteNote(id){state.notes=state.notes.filter(n=>n.id!==id);saveState();renderNotes();showToast('Note deleted','danger');}

// ===== QUICK LINKS =====
let nextLinkId = Math.max(0, ...state.links.map(l=>l.id)) + 1;

// Auto-detect icon from URL/label
function guessIcon(label, url) {
  const map = {
    gmail:'fa-envelope', mail:'fa-envelope', outlook:'fa-envelope',
    github:'fa-github', gitlab:'fa-gitlab',
    notion:'fa-n', figma:'fa-pen-nib',
    slack:'fa-hashtag', discord:'fa-discord', teams:'fa-microsoft',
    drive:'fa-hard-drive', dropbox:'fa-dropbox',
    calendar:'fa-calendar', meet:'fa-video', zoom:'fa-video',
    linear:'fa-circle-half-stroke', jira:'fa-jira', asana:'fa-a',
    vercel:'fa-triangle-exclamation', netlify:'fa-n',
    spotify:'fa-music', youtube:'fa-youtube', netflix:'fa-film',
    twitter:'fa-twitter', x:'fa-x-twitter', linkedin:'fa-linkedin',
    instagram:'fa-instagram', reddit:'fa-reddit',
    openai:'fa-robot', claude:'fa-robot', chatgpt:'fa-robot',
    docs:'fa-file-lines', sheets:'fa-table-cells', slides:'fa-display',
    trello:'fa-trello', clickup:'fa-c', monday:'fa-m',
    aws:'fa-aws', azure:'fa-microsoft', gcp:'fa-google',
    npm:'fa-npm', docker:'fa-docker',
  };
  const combined = (label + ' ' + url).toLowerCase();
  for (const [k,v] of Object.entries(map)) { if (combined.includes(k)) return v; }
  return 'fa-link';
}

// Get favicon URL
function faviconUrl(url) {
  try {
    const domain = new URL(url).hostname;
    return `https://www.google.com/s2/favicons?sz=32&domain=${domain}`;
  } catch { return null; }
}

function renderLaunchpad() {
  const links = state.links;
  const groups = ['work','dev','comms','tools','other'];
  const groupLabels = { work:'Work', dev:'Dev', comms:'Comms', tools:'Tools', other:'Other' };
  const groupIcons = { work:'fa-briefcase', dev:'fa-code', comms:'fa-comments', tools:'fa-screwdriver-wrench', other:'fa-star' };

  // Group links
  const grouped = {};
  groups.forEach(g => { grouped[g] = links.filter(l=>l.group===g); });

  let html = '';
  groups.forEach(g => {
    if (!grouped[g].length) return;
    html += `<div class="link-group-label"><i class="fas ${groupIcons[g]} mr-1" style="font-size:7px;"></i>${groupLabels[g]}</div>`;
    html += `<div class="launchpad-grid mb-3">`;
    grouped[g].forEach(link => {
      const icon = link.icon || guessIcon(link.label, link.url);
      const color = link.color || '#E8A838';
      const bgAlpha = hexToRgba(color, 0.08);
      const hoverBg = hexToRgba(color, 0.12);
      html += `
        <a class="link-tile" href="${esc(link.url)}" target="_blank" rel="noopener" title="${esc(link.label)}"
           style="--tile-color:${color};"
           onmouseover="this.style.borderColor='${color}40';this.style.background='${hoverBg}'"
           onmouseout="this.style.borderColor='#242D3B';this.style.background='rgba(19,24,32,0.6)'"
        >
          <div class="tile-del" onclick="event.preventDefault();event.stopPropagation();deleteLink(${link.id})">
            <i class="fas fa-xmark"></i>
          </div>
          <div class="link-icon" style="background:${bgAlpha};color:${color};">
            <i class="fab ${icon} fa-${icon.replace('fa-','')} fas ${icon}"></i>
          </div>
          <span class="link-label">${esc(link.label)}</span>
        </a>`;
    });
    html += `</div>`;
  });

  // Add tile
  html += `<div class="link-tile-add" onclick="openLinkModal()">
    <i class="fas fa-plus"></i>
    <span>Add link</span>
  </div>`;

  document.getElementById('launchpadBody').innerHTML = html;
}

function hexToRgba(hex, alpha) {
  try {
    let h = hex.replace('#','');
    if (h.length===3) h=h.split('').map(c=>c+c).join('');
    const r=parseInt(h.substr(0,2),16), g=parseInt(h.substr(2,2),16), b=parseInt(h.substr(4,2),16);
    return `rgba(${r},${g},${b},${alpha})`;
  } catch { return `rgba(232,168,56,${alpha})`; }
}

function selectColor(el, color) {
  selectedLinkColor = color;
  document.querySelectorAll('#linkColorPicker .color-swatch').forEach(s => {
    s.style.borderColor = s===el ? '#E8ECF1' : 'transparent';
    s.style.transform = s===el ? 'scale(1.2)' : 'scale(1)';
  });
}

function openLinkModal() {
  document.getElementById('linkLabel').value='';
  document.getElementById('linkUrl').value='';
  document.getElementById('linkIcon').value='';
  document.getElementById('linkGroup').value='work';
  selectedLinkColor='#E8A838';
  // Reset swatches
  document.querySelectorAll('#linkColorPicker .color-swatch').forEach(s => {
    s.style.borderColor = s.dataset.color==='#E8A838' ? '#E8ECF1' : 'transparent';
    s.style.transform = s.dataset.color==='#E8A838' ? 'scale(1.2)' : 'scale(1)';
  });
  document.getElementById('linkModal').style.display='flex';
  setTimeout(()=>document.getElementById('linkLabel').focus(),100);
}
function closeLinkModal() { document.getElementById('linkModal').style.display='none'; }

function saveLink() {
  const label = document.getElementById('linkLabel').value.trim();
  const url = document.getElementById('linkUrl').value.trim();
  if (!label) { showToast('Enter a label','danger'); return; }
  if (!url) { showToast('Enter a URL','danger'); return; }
  let finalUrl = url;
  if (!/^https?:\/\//i.test(finalUrl)) finalUrl = 'https://' + finalUrl;
  const iconInput = document.getElementById('linkIcon').value.trim();
  const icon = iconInput || guessIcon(label, finalUrl);
  state.links.push({
    id: nextLinkId++, label, url: finalUrl,
    group: document.getElementById('linkGroup').value,
    icon, color: selectedLinkColor,
  });
  saveState(); renderLaunchpad(); closeLinkModal();
  showToast('Link added','success');
}

function deleteLink(id) {
  state.links = state.links.filter(l=>l.id!==id);
  saveState(); renderLaunchpad();
  showToast('Link removed','danger');
}

// ===== UTILS =====
function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}
function timeAgo(ts){const m=Math.floor((Date.now()-ts)/60000);if(m<1)return'now';if(m<60)return`${m}m`;const h=Math.floor(m/60);if(h<24)return`${h}h`;return`${Math.floor(h/24)}d`;}
function fmtDate(ds){try{return new Date(ds+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});}catch(e){return ds;}}
function getYesterday(){const d=new Date();d.setDate(d.getDate()-1);return d.toISOString().split('T')[0];}

// ===== KEYBOARD =====
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){closeAddTaskModal();closeNoteModal();closeLinkModal();}
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();document.getElementById('quickCapture').focus();}
});

// ===== INIT =====
function init() {
  document.getElementById('newTaskDate').value=todayStr();
  renderTasks(); renderCalendar(); renderNotes(); renderLaunchpad(); updateStats();
}
init();
</script>
</body>
